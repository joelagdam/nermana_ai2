<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nermana</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>
    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <div class="app">
      <aside class="rail">
        <div class="brand">
          <img src="/static/mark.svg" alt="" />
          <div>
            <strong>Nermana</strong>
            <span>offline rank console</span>
          </div>
        </div>
        <nav id="nav" class="tab-nav" aria-label="Main tabs">
          <button data-page="dashboard" class="active"><span></span>Dashboard</button>
          <button data-page="chat"><span></span>Chat</button>
          <button data-page="models"><span></span>Models</button>
          <button data-page="tools"><span></span>Tools</button>
          <button data-page="memory"><span></span>Memory</button>
          <button data-page="files"><span></span>Files</button>
          <button data-page="providers"><span></span>Providers</button>
          <button data-page="phone"><span></span>Phone</button>
          <button data-page="telegram"><span></span>Telegram</button>
          <button data-page="logs"><span></span>Logs</button>
          <button data-page="settings"><span></span>Settings</button>
        </nav>
      </aside>

      <main>
        <header class="topbar">
          <button id="drawerButton" class="icon-button" aria-label="Open menu"><span></span><span></span><span></span></button>
          <div>
            <h1 id="pageTitle">Dashboard</h1>
            <p id="statusLine">Loading status</p>
          </div>
          <div class="status-pills" id="statusPills"></div>
          <button id="refreshButton" class="primary-action">Refresh</button>
        </header>

        <section id="dashboard" class="page active">
          <div class="dashboard-hero">
            <div>
              <p class="eyebrow">System overview</p>
              <h2>Nermana control center</h2>
              <p id="dashboardSummary">Loading working indicators and stats.</p>
            </div>
            <div class="rank-readout">
              <strong id="dashboardWorkingCount">0/0</strong>
              <span>working</span>
            </div>
          </div>
          <div id="dashboardStats" class="metric-grid"></div>
          <div class="dashboard-actions">
            <button type="button" data-jump="chat">Open Chat</button>
            <button type="button" data-jump="models">Models</button>
            <button type="button" data-jump="tools">Tools</button>
            <button type="button" data-jump="providers">Providers</button>
          </div>
          <div class="dashboard-layout">
            <section class="dashboard-panel">
              <div class="panel-heading">
                <h3>Working Indicators</h3>
                <span id="workerHealthLabel">Checking</span>
              </div>
              <div id="workerList" class="worker-list"></div>
            </section>
            <section class="dashboard-panel">
              <div class="panel-heading">
                <h3>Recent Activity</h3>
                <span id="dashboardGeneratedAt">Live</span>
              </div>
              <div id="activityList" class="activity-list"></div>
            </section>
            <section class="dashboard-panel">
              <div class="panel-heading">
                <h3>Downloads</h3>
                <span id="downloadHealthLabel">Idle</span>
              </div>
              <div id="downloadList" class="activity-list"></div>
            </section>
          </div>
        </section>

        <section id="chat" class="page">
          <div class="chat-shell">
            <div class="chat-profile">
              <div class="avatar-mark">N</div>
              <div>
                <strong>Nermana</strong>
                <span id="chatPresence">checking local core</span>
              </div>
              <button id="chatWeatherQuick" type="button">Weather</button>
              <button id="chatSearchQuick" type="button">Search</button>
            </div>
            <div id="chatLog" class="chat-log"></div>
            <div id="chatAttachTray" class="attach-tray">
              <input id="chatFileInput" type="file" hidden />
              <button id="chatAttachButton" type="button">Attach</button>
              <label>Index <input id="chatIndexUpload" type="checkbox" checked /></label>
              <span id="chatFileState">Allowed folder upload</span>
            </div>
            <form id="chatForm" class="composer">
              <input id="chatInput" name="message" autocomplete="off" placeholder="Message Nermana" />
              <button class="primary-action">Send</button>
            </form>
          </div>
        </section>

        <section id="models" class="page">
          <div class="segmented-tabs" data-tab-group="models">
            <button type="button" class="active" data-model-tab="manage">Manage</button>
            <button type="button" data-model-tab="download">Download</button>
            <button type="button" data-model-tab="runtime">Settings</button>
            <button type="button" data-model-tab="test">Test</button>
          </div>
          <div class="model-tab active" id="modelTab-manage">
            <div class="toolbar">
              <button id="scanModels">Scan Models</button>
            </div>
            <div id="modelsList" class="list"></div>
          </div>
          <div class="model-tab" id="modelTab-download">
            <div id="presetsList" class="list preset-list"></div>
            <form id="modelDownload" class="grid-form">
              <label>Preset
                <select name="preset_id"></select>
              </label>
              <label>Direct GGUF link <input name="url" placeholder="https://...model.gguf" /></label>
              <label>Save as <input name="filename" placeholder="optional-name.gguf" /></label>
              <label>Select after download <input name="select" type="checkbox" checked /></label>
              <button class="primary-action">Download Model</button>
            </form>
            <div id="downloadProgress" class="progress-panel" hidden>
              <div>
                <strong id="downloadProgressTitle">Download</strong>
                <span id="downloadProgressText">Starting</span>
              </div>
              <progress id="downloadProgressBar" max="100" value="0"></progress>
              <button id="cancelDownloadButton" type="button" hidden>Cancel Download</button>
            </div>
            <div class="toolbar">
              <button id="refreshPartialsButton" type="button">Refresh Partials</button>
            </div>
            <div id="partialDownloads" class="list"></div>
            <div id="downloadOutput" class="result-panel"></div>
          </div>
          <div class="model-tab" id="modelTab-runtime">
            <div class="toolbar">
              <button id="healthModel">Health Check</button>
              <button id="restartModel">Restart Server</button>
              <button id="startModel">Start Server</button>
              <button id="stopModel">Stop Server</button>
              <button id="detectLlama">Use Detected llama-server</button>
            </div>
            <div id="llamaStatus" class="setup-panel"></div>
            <div id="modelRuntimeStatus" class="setup-panel"></div>
            <form id="modelSettings" class="grid-form">
              <label>Models folder <input name="models_dir" placeholder="models" /></label>
              <label>Base URL <input name="base_url" /></label>
              <label>llama-server <input name="llama_server_path" placeholder="auto or ~/llama.cpp/build/bin/llama-server" /></label>
              <label>Context <input name="context_size" type="number" min="512" step="512" /></label>
              <label>Threads <input name="threads" type="number" min="0" /></label>
              <label>Batch <input name="batch_size" type="number" min="64" step="64" /></label>
              <label>Micro batch <input name="ubatch_size" type="number" min="32" step="32" /></label>
              <label>Parallel slots <input name="parallel_slots" type="number" min="1" /></label>
              <label>Timeout seconds <input name="request_timeout_seconds" type="number" min="15" step="5" /></label>
              <label>Lock model in RAM <input name="mlock" type="checkbox" /></label>
              <label>No mmap <input name="no_mmap" type="checkbox" /></label>
              <label>Temperature <input name="temperature" type="number" step="0.05" min="0" max="2" /></label>
              <label>Top P <input name="top_p" type="number" step="0.05" min="0" max="1" /></label>
              <label>Thinking
                <select name="thinking_mode">
                  <option value="auto">auto</option>
                  <option value="no_think">no_think</option>
                  <option value="think">think</option>
                </select>
              </label>
              <button class="primary-action">Save Model Settings</button>
            </form>
          </div>
          <div class="model-tab" id="modelTab-test">
            <form id="modelTest" class="inline-form">
              <input name="message" placeholder="Model test prompt" />
              <button>Test</button>
            </form>
            <div id="modelOutput" class="result-panel"></div>
          </div>
        </section>

        <section id="tools" class="page">
          <form id="toolDecisionSettings" class="grid-form">
            <label>Semi-auto tools <input name="safety.semi_auto_tools_enabled" type="checkbox" /></label>
            <label>Confirm before tools <input name="safety.confirm_semi_auto_tools" type="checkbox" /></label>
            <label>Max tool risk
              <select name="safety.max_tool_risk">
                <option value="read">read</option>
                <option value="power">power</option>
              </select>
            </label>
            <button class="primary-action">Save Tool Decisions</button>
          </form>
          <div id="toolsList" class="table"></div>
          <form id="toolRun" class="tool-run">
            <select name="tool"></select>
            <textarea name="payload" spellcheck="false">{}</textarea>
            <button>Run Tool</button>
          </form>
          <div id="toolOutput" class="result-panel"></div>
        </section>

        <section id="memory" class="page">
          <form id="memorySearch" class="inline-form">
            <input name="q" placeholder="Search memory" />
            <button>Search</button>
          </form>
          <form id="memoryAdd" class="stack-form">
            <textarea name="content" placeholder="Memory text"></textarea>
            <input name="tags" placeholder="tags" />
            <button class="primary-action">Add Memory</button>
          </form>
          <form id="memoryEdit" class="grid-form" hidden>
            <label>ID <input name="id" readonly /></label>
            <label>Source <input name="source" /></label>
            <label>Tags <input name="tags" /></label>
            <label>Importance <input name="importance" type="number" min="0" max="1" step="0.05" /></label>
            <label>Consolidated <input name="consolidated" type="checkbox" /></label>
            <label>Entities <input name="entities" placeholder="comma separated" /></label>
            <label>Topics <input name="topics" placeholder="comma separated" /></label>
            <label>Summary <textarea name="summary"></textarea></label>
            <label>Content <textarea name="content"></textarea></label>
            <button class="primary-action">Save Memory</button>
            <button id="cancelMemoryEdit" type="button">Cancel</button>
          </form>
          <div id="memoryOutput" class="result-panel"></div>
          <div id="memoryList" class="list"></div>
        </section>

        <section id="files" class="page">
          <form id="fileSettings" class="stack-form">
            <textarea name="allowed_dirs" spellcheck="false"></textarea>
            <label>Max read MB <input name="max_read_mb" type="number" min="1" /></label>
            <button class="primary-action">Save File Settings</button>
          </form>
          <form id="fileRead" class="inline-form">
            <input name="path" placeholder="Allowed file or folder path" />
            <button name="action" value="read">Read</button>
            <button name="action" value="list">List</button>
            <button name="action" value="index">Index</button>
          </form>
          <div id="fileOutput" class="result-panel"></div>
        </section>

        <section id="providers" class="page">
          <form id="providersForm" class="grid-form">
            <label>Search provider
              <select name="search.provider">
                <option value="auto">Auto</option>
                <option value="duckduckgo">DuckDuckGo</option>
                <option value="searxng">SearXNG</option>
                <option value="wikipedia">Wikipedia</option>
                <option value="hackernews">Hacker News</option>
              </select>
            </label>
            <label>SearXNG URL <input name="search.searxng_url" placeholder="http://127.0.0.1:8888" /></label>
            <label>Search enabled <input name="search.enabled" type="checkbox" /></label>
            <label>Max results <input name="search.max_results" type="number" min="1" max="10" /></label>
            <label>Weather location <input name="weather.location_name" /></label>
            <label>Latitude <input name="weather.latitude" type="number" step="0.0001" /></label>
            <label>Longitude <input name="weather.longitude" type="number" step="0.0001" /></label>
            <label>Image enabled <input name="providers.image_enabled" type="checkbox" /></label>
            <label>Image endpoint <input name="providers.image_endpoint" placeholder="http://127.0.0.1:7860/sdapi/v1/txt2img" /></label>
            <label>Image key <input name="providers.image_api_key" /></label>
            <label>Vision enabled <input name="providers.vision_enabled" type="checkbox" /></label>
            <label>Vision endpoint <input name="providers.vision_endpoint" placeholder="http://127.0.0.1:8081/v1/vision" /></label>
            <label>Vision key <input name="providers.vision_api_key" /></label>
            <button class="primary-action">Save Providers</button>
          </form>
          <form id="searchTest" class="inline-form">
            <input name="query" placeholder="Test web search" />
            <button>Search</button>
          </form>
          <div id="searchOutput" class="result-panel"></div>
        </section>

        <section id="phone" class="page">
          <form id="phoneSettings" class="grid-form">
            <label>Phone control <input name="phone.enabled" type="checkbox" /></label>
            <label>Termux <input name="phone.termux_enabled" type="checkbox" /></label>
            <label>Shizuku <input name="phone.shizuku_enabled" type="checkbox" /></label>
            <label>rish path <input name="phone.rish_path" /></label>
            <label>Autonomy
              <select name="safety.max_tool_risk">
                <option value="read">read</option>
                <option value="power">power</option>
              </select>
            </label>
            <button class="primary-action">Save Phone Settings</button>
          </form>
          <div class="toolbar">
            <button data-phone-tool="phone_status">Status</button>
            <button data-phone-tool="list_packages">Packages</button>
          </div>
          <form id="phoneAction" class="grid-form">
            <label>Package <input name="package" /></label>
            <label>Permission <input name="permission" /></label>
            <label>Namespace <input name="namespace" value="system" /></label>
            <label>Key <input name="key" /></label>
            <label>Value <input name="value" /></label>
            <label>Enabled <input name="enabled" type="checkbox" checked /></label>
            <label>Granted <input name="granted" type="checkbox" checked /></label>
            <label>AppOp <input name="op" /></label>
            <label>Mode <input name="mode" /></label>
            <select name="tool">
              <option value="force_stop_app">force_stop_app</option>
              <option value="set_app_enabled">set_app_enabled</option>
              <option value="set_permission">set_permission</option>
              <option value="appops_set">appops_set</option>
              <option value="settings_get">settings_get</option>
              <option value="settings_put">settings_put</option>
            </select>
            <button class="primary-action">Run Phone Action</button>
          </form>
          <div id="phoneOutput" class="result-panel"></div>
        </section>

        <section id="telegram" class="page">
          <form id="telegramSettings" class="grid-form">
            <label>Enabled <input name="telegram.enabled" type="checkbox" /></label>
            <label>Token <input name="telegram.token" /></label>
            <label>Allowed user IDs <input name="telegram.allowed_user_ids" /></label>
            <button class="primary-action">Save Telegram</button>
          </form>
          <div class="toolbar">
            <button id="telegramStatus" type="button">Status</button>
            <button id="telegramStart">Start Polling</button>
            <button id="telegramPoll">Poll Once</button>
            <button id="telegramClearWebhook" type="button">Clear Webhook</button>
            <button id="telegramResetOffset">Drop Pending</button>
          </div>
          <div id="telegramOutput" class="result-panel"></div>
        </section>

        <section id="logs" class="page">
          <div id="logsOutput" class="dashboard-layout"></div>
        </section>

        <section id="settings" class="page">
          <div class="toolbar">
            <button id="checkUpdateButton">Check Updates</button>
            <button id="updateButton" class="primary-action">Pull Latest Push</button>
            <button id="showDefaultsButton" type="button">Show Defaults</button>
            <button id="resetDefaultsButton" type="button">Restore Defaults</button>
            <button id="fullResetDefaultsButton" type="button">Full Defaults</button>
          </div>
          <div id="updateStatus" class="setup-panel"></div>
          <form id="settingsForm" class="grid-form">
            <label>Web host <input name="server.host" /></label>
            <label>Web port <input name="server.port" type="number" min="1" max="65535" /></label>
            <label>Public URL <input name="server.public_url" placeholder="optional tunnel URL" /></label>
            <label>Auto-start model <input name="model.auto_start_server" type="checkbox" /></label>
            <label>Auto memory <input name="memory.auto_remember" type="checkbox" /></label>
            <label>Retain messages <input name="memory.retain_messages" type="number" min="20" /></label>
            <label>Consolidate every seconds <input name="memory.consolidate_every_seconds" type="number" min="60" step="60" /></label>
            <label>Minimum memories to consolidate <input name="memory.min_consolidate_items" type="number" min="2" /></label>
            <label>Autonomy
              <select name="safety.autonomy">
                <option value="read_only">read_only</option>
                <option value="power_user">power_user</option>
              </select>
            </label>
            <label>Confirm power tools <input name="safety.require_confirmation_for_power" type="checkbox" /></label>
            <button class="primary-action">Save Settings</button>
          </form>
          <div id="settingsCards" class="metric-grid"></div>
          <div id="updateOutput" class="result-panel"></div>
          <div id="settingsOutput" class="result-panel"></div>
        </section>
      </main>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
